name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:     # allows manual trigger from GitHub Actions tab

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Yonderfix.Web/Yonderfix.Web.csproj

      - name: Build and Publish
        run: dotnet publish src/Yonderfix.Web/Yonderfix.Web.csproj -c Release -o ${{ github.workspace }}\publish --no-restore

      - name: Install Web Deploy
        shell: powershell
        run: choco install webdeploy --yes --no-progress

      - name: Deploy via Web Deploy
        shell: powershell
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          & $msdeploy `
            -verb:sync `
            -source:contentPath="${{ github.workspace }}\publish" `
            -dest:contentPath="${{ secrets.WEBDEPLOY_SITENAME }}",computerName="${{ secrets.WEBDEPLOY_SERVER }}",userName="${{ secrets.WEBDEPLOY_USERNAME }}",password="${{ secrets.WEBDEPLOY_PASSWORD }}",authType="Basic" `
            -enableRule:AppOffline `
            -allowUntrusted `
            -retryAttempts:3 `
            -retryInterval:2000
          if ($LASTEXITCODE -ne 0) { throw "Deployment failed (msdeploy exit code $LASTEXITCODE)" }
